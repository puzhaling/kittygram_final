server {
    listen 80;
    server_name _;
    
    # API проксирование
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Админка
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
    }
    
    # Медиа файлы
    location /media/ {
        alias /media/;
    }
    
    # Статические файлы React - исправленный блок!
    location /static/ {
        alias /static/static/;  # Перенаправляем /static/* в /static/static/*
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Favicon и manifest
    location = /favicon.ico {
        alias /static/favicon.ico;
    }
    
    location = /manifest.json {
        alias /static/manifest.json;
    }
    
    # Главная страница
    location / {
        root /static;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
